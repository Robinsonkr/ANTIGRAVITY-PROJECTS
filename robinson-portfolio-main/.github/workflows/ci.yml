# ============================================
# CI Pipeline — Lint & Build Verification
# Runs on every push and PR to main
# ============================================

name: CI — Lint & Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────
  # Job 1: Python Backend Linting
  # ─────────────────────────────────────────
  lint-backend:
    name: 🐍 Lint Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: 🔍 Run Flake8 linting
        run: |
          cd backend
          flake8 . --config=.flake8

  # ─────────────────────────────────────────
  # Job 2: Docker Build Verification
  # ─────────────────────────────────────────
  build-backend:
    name: 🐳 Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: lint-backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker image
        run: |
          docker build -t robinson-backend:ci ./backend

      - name: ✅ Verify image was created
        run: |
          docker images robinson-backend:ci
          echo "✅ Docker image built successfully!"

  # ─────────────────────────────────────────
  # Job 3: Frontend Validation
  # ─────────────────────────────────────────
  validate-frontend:
    name: 🌐 Validate Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Check HTML files exist
        run: |
          echo "Checking critical frontend files..."
          test -f index.html && echo "✅ index.html exists" || (echo "❌ index.html missing" && exit 1)
          test -f resume.html && echo "✅ resume.html exists" || (echo "❌ resume.html missing" && exit 1)
          test -f css/style.css && echo "✅ style.css exists" || (echo "❌ style.css missing" && exit 1)
          test -f css/chat.css && echo "✅ chat.css exists" || (echo "❌ chat.css missing" && exit 1)
          test -f js/main.js && echo "✅ main.js exists" || (echo "❌ main.js missing" && exit 1)
          test -f js/chat.js && echo "✅ chat.js exists" || (echo "❌ chat.js missing" && exit 1)

      - name: 🔗 Check for broken asset references
        run: |
          echo "Checking for broken CSS/JS references in HTML..."
          # Verify referenced files exist
          grep -oP 'href="(?!http|#|mailto|tel)([^"]+)"' index.html | sed 's/href="//;s/"//' | while read -r file; do
            if [ -f "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ Missing: $file"
              exit 1
            fi
          done
          echo "✅ All local asset references valid!"
